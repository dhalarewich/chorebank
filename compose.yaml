services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://chorebank:${POSTGRES_PASSWORD}@db:5432/chorebank?schema=public
      DIRECT_URL: postgresql://chorebank:${POSTGRES_PASSWORD}@db:5432/chorebank?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      SETUP_TOKEN: ${SETUP_TOKEN}
      DEFAULT_HOUSEHOLD_ID: ${DEFAULT_HOUSEHOLD_ID:-chorebank-household}
      TENANCY_MODE: single
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chorebank
      POSTGRES_USER: chorebank
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chorebank -d chorebank"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - chorebank-postgres:/var/lib/postgresql/data

volumes:
  chorebank-postgres:
