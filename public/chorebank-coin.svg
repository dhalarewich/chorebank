<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Chorebank coin</title>
  <desc id="desc">A warm gold coin with the Chorebank cent mark.</desc>
  <defs>
    <radialGradient id="coin-face" cx="36%" cy="28%" r="76%">
      <stop offset="0" stop-color="#fff3a8"/>
      <stop offset="0.42" stop-color="#f5c843"/>
      <stop offset="1" stop-color="#d99f16"/>
    </radialGradient>
    <linearGradient id="coin-rim" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffe884"/>
      <stop offset="0.48" stop-color="#c98b08"/>
      <stop offset="1" stop-color="#8f5f05"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#5b3900" flood-opacity="0.32"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="256" cy="246" r="218" fill="url(#coin-rim)"/>
    <circle cx="256" cy="246" r="197" fill="url(#coin-face)" stroke="#f9dc68" stroke-width="8"/>
    <circle cx="256" cy="246" r="161" fill="none" stroke="#c9910d" stroke-width="10" opacity="0.7"/>
    <circle cx="256" cy="246" r="137" fill="none" stroke="#ffe477" stroke-width="5" opacity="0.62"/>
    <path d="M151 128a177 177 0 0 1 152-60" fill="none" stroke="#fff8c9" stroke-width="13" stroke-linecap="round" opacity="0.72"/>
    <text x="256" y="329" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="220" font-weight="700" fill="#a56e08">¢</text>
  </g>
</svg>
