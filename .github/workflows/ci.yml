name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      DIRECT_URL: postgresql://user:pass@localhost:5432/db
      AUTH_SECRET: test-auth-secret-for-chorebank-ci-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --coverage
      - run: node scripts/check-domain-coverage.mjs
      - run: npm run build

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Semgrep (OWASP + secrets)
        run: |
          python3 -m pip install --upgrade pip
          pip install semgrep
          semgrep scan --config p/owasp-top-ten --config p/secrets src prisma scripts .github/workflows
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
          scan-ref: .

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chorebank_test
          POSTGRES_USER: chorebank
          POSTGRES_PASSWORD: chorebank_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chorebank -d chorebank_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://chorebank:chorebank_test_password@localhost:5432/chorebank_test?schema=public
      DIRECT_URL: postgresql://chorebank:chorebank_test_password@localhost:5432/chorebank_test?schema=public
      AUTH_SECRET: test-auth-secret-for-chorebank-ci-only
      DEFAULT_HOUSEHOLD_ID: chorebank-household
      TENANCY_MODE: single
      LIVE_E2E_CORE_LOOP: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:migrate:deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
