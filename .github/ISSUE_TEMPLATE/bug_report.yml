name: Bug report
description: Report a reproducible Chorebank problem without sharing household data.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include names, emails, passwords, PINs, cookies, database URLs, IP addresses, or unredacted screenshots/logs. For vulnerabilities, use the private security advisory link."
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Use a release, image tag, or sanitized commit SHA.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Safe reproduction steps
      description: Use generic demo data only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Installation path
      options: [Docker Compose, Node.js with PostgreSQL, Other]
    validations:
      required: true
